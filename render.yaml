services:
  - type: web
    name: malldesk
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn malldesk.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --keep-alive 5"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: malldesk-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: "malldesk.custom_email_backend.SSLBypassEmailBackend"
      - key: EMAIL_HOST
        value: "smtp.dreamhost.com"
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_TLS
        value: "False"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        value: "mis.accounts@vsquareservices.com"
      - key: EMAIL_HOST_PASSWORD
        value: "Legend@7570#Square"
      - key: DEFAULT_FROM_EMAIL
        value: "MallDesk <mis.accounts@vsquareservices.com>"
      - key: MALLDESK_ADMIN_EMAILS
        value: "mis@vsquareservices.com"
      - key: MALLDESK_CC_EMAILS
        value: ""
      - key: WHATSAPP_NOTIFY_NUMBER
        value: "917503020176"
      - key: TICKET_REMINDER_HOURS
        value: "2"
      - key: TICKET_REMINDER_CHECK_INTERVAL
        value: "30"
      - key: TICKET_REMINDER_MAX
        value: "5"

databases:
  - name: malldesk-db
    plan: free
    databaseName: malldesk
    user: malldesk_user